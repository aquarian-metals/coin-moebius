name: Release

on:
  push:
    tags: ["v*"]

# Required for npm provenance via OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run verify

      # Determine the dist-tag from the root package version-style. Pre-release
      # versions (`*-beta.x`, `*-rc.x`, etc.) ship under the `beta` tag; stable
      # versions ship under `latest`. Every workspace ships under the same tag.
      - name: Determine dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          TAG=latest
          case "$VERSION" in *-*) TAG=beta ;; esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing under dist-tag: $TAG"

      # Publish every workspace marked public. `--workspaces` iterates them all;
      # workspaces with `"private": true` (like examples/) are skipped automatically.
      - name: Publish workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspaces --tag ${{ steps.tag.outputs.tag }} --provenance
