name: Release

on:
  push:
    tags: ['v*']

# Required for npm provenance via OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm test
      - run: npm run build

      # Publish each package in dependency order. Versions ending with `-…`
      # (e.g. 0.1.0-beta.1) ship under the `beta` dist-tag; stable versions
      # ship under `latest`.
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in \
            packages/core \
            packages/coin-moebius \
            packages/server \
            packages/providers/template \
            packages/providers/stripe \
            packages/providers/monero-cryptomus
          do
            VERSION=$(node -p "require('./$pkg/package.json').version")
            TAG=latest
            case "$VERSION" in *-*) TAG=beta ;; esac
            echo "Publishing $pkg @ $VERSION (tag: $TAG)"
            (cd "$pkg" && npm publish --tag "$TAG" --provenance)
          done
